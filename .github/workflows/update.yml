name: Update Data

on:
  schedule:
    - cron: '0 2 * * *'  # 10:00 AM Beijing Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Run data collector
        run: node scripts/fetch.js
      
      - name: Update history index
        run: |
          cd data/history
          ls -1 *.json 2>/dev/null | sort > ../history-index.txt || echo "" > ../history-index.txt
          cd ..
          if [ -s history-index.txt ]; then
            sed -i 's/^/"/' history-index.txt
            sed -i 's/$/"/' history-index.txt
            sed -i ':a;N;$!ba;s/\n/,/g' history-index.txt
            echo "[$(cat history-index.txt)]" > history/index.json
          else
            echo "[]" > history/index.json
          fi
          rm -f history-index.txt
      
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update data $(date '+%Y-%m-%d %H:%M')"
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
