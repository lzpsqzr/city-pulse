<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City Pulse - 城市脉搏</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 40px 20px; }
    h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle { color: #888; font-size: 1rem; }
    .update-time { color: #666; font-size: 0.85rem; margin-top: 10px; }
    
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .metric-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 25px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .metric-card h3 { color: #888; font-size: 0.9rem; margin-bottom: 10px; font-weight: normal; }
    .metric-value { font-size: 2.5rem; font-weight: bold; color: #fff; }
    .metric-unit { font-size: 1rem; color: #888; margin-left: 5px; }
    .metric-change { margin-top: 10px; font-size: 0.9rem; }
    .metric-change.up { color: #ef4444; }
    .metric-change.down { color: #22c55e; }
    
    .section { margin: 40px 0; }
    .section h2 { font-size: 1.5rem; margin-bottom: 20px; color: #fff; }
    
    .districts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .district-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .district-card:hover { background: rgba(255, 255, 255, 0.06); }
    .district-name { font-weight: 500; }
    .district-price { text-align: right; }
    .district-price .value { font-weight: bold; color: #00d4ff; }
    .district-price .change { font-size: 0.8rem; margin-left: 8px; }
    .district-price .change.up { color: #ef4444; }
    .district-price .change.down { color: #22c55e; }
    
    .properties-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .property-card {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.2s, background 0.2s;
    }
    .property-card:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.06);
    }
    .property-location { color: #7c3aed; font-size: 0.85rem; margin-bottom: 8px; }
    .property-name { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 10px; }
    .property-name a { color: #fff; text-decoration: none; }
    .property-name a:hover { color: #00d4ff; }
    .property-price { font-size: 1.5rem; font-weight: bold; color: #00d4ff; margin-bottom: 5px; }
    .property-price span { font-size: 0.9rem; color: #888; font-weight: normal; }
    .property-layout { color: #888; font-size: 0.9rem; }
    
    .chart-container {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
    }
    
    footer { text-align: center; padding: 40px 20px; color: #666; font-size: 0.85rem; }
    .loading { text-align: center; padding: 60px; color: #666; }
    
    @media (max-width: 600px) {
      h1 { font-size: 1.8rem; }
      .metric-value { font-size: 2rem; }
      .districts-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏙️ City Pulse</h1>
      <p class="subtitle">上海城市生活指标追踪</p>
      <p class="update-time" id="updateTime">加载中...</p>
    </header>

    <div class="metrics-grid">
      <div class="metric-card">
        <h3>二月二手房参考均价</h3>
        <span class="metric-value" id="resalePrice">--</span>
        <span class="metric-unit">元/㎡</span>
        <div class="metric-change" id="resaleChange"></div>
      </div>
      <div class="metric-card">
        <h3>二月新房参考均价</h3>
        <span class="metric-value" id="newPrice">--</span>
        <span class="metric-unit">元/㎡</span>
        <div class="metric-change" id="newChange"></div>
      </div>
    </div>

    <div class="section">
      <h2>📍 各区县房价</h2>
      <div class="districts-grid" id="districtsGrid">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <div class="section">
      <h2>🏗️ 精选新房推荐 <span style="font-size:0.8em;color:#888;font-weight:normal">(按偏好排序)</span></h2>
      <div class="properties-grid" id="newPropertiesGrid">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <div class="section">
      <h2>🏘️ 精选二手房推荐 <span style="font-size:0.8em;color:#888;font-weight:normal">(新江湾城, <700万)</span></h2>
      <div class="properties-grid" id="resalePropertiesGrid">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <div class="section">
      <h2>📈 历史趋势</h2>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <footer>
      <p>每日自动更新 · 仅供参考</p>
    </footer>
  </div>

  <script>
    function formatNumber(num) {
      return num ? num.toLocaleString() : '--';
    }

    function formatChange(change) {
      if (change === null || change === undefined) return '';
      const sign = change > 0 ? '+' : '';
      const cls = change > 0 ? 'up' : change < 0 ? 'down' : '';
      const arrow = change > 0 ? '↑' : change < 0 ? '↓' : '';
      return `<span class="change ${cls}">${arrow}${sign}${Math.abs(change)}%</span>`;
    }

    async function loadData() {
      try {
        const response = await fetch('data/latest.json');
        const data = await response.json();

        // Update time
        document.getElementById('updateTime').textContent = 
          `更新于 ${new Date(data.updatedAt).toLocaleString('zh-CN')}`;

        // Update metrics
        document.getElementById('resalePrice').textContent = 
          formatNumber(data.metrics.resale.avgPrice);
        
        document.getElementById('newPrice').textContent = 
          formatNumber(data.metrics.new.avgPrice);
        
        const newChange = data.metrics.new.change;
        const changeEl = document.getElementById('newChange');
        if (newChange !== null) {
          changeEl.innerHTML = `环比上月 ${newChange > 0 ? '↑' : '↓'} ${Math.abs(newChange)}%`;
          changeEl.className = `metric-change ${newChange > 0 ? 'up' : 'down'}`;
        }

        // Update districts
        const districtsGrid = document.getElementById('districtsGrid');
        if (data.districts && data.districts.length > 0) {
          districtsGrid.innerHTML = data.districts
            .sort((a, b) => b.price - a.price)
            .map(d => `
              <div class="district-card">
                <span class="district-name">${d.name}</span>
                <div class="district-price">
                  <span class="value">${formatNumber(d.price)}</span>
                  ${formatChange(d.change)}
                </div>
              </div>
            `).join('');
        }

        // Update new properties
        const newPropsGrid = document.getElementById('newPropertiesGrid');
        if (data.newProperties && data.newProperties.length > 0) {
          newPropsGrid.innerHTML = data.newProperties.map((p, i) => {
            const priceStr = p.totalPrice 
              ? `${p.totalPrice}万起 (${formatNumber(p.unitPrice)}元/㎡)`
              : `${formatNumber(p.unitPrice)}元/㎡`;
            return `
              <div class="property-card">
                <div class="property-location">
                  <span style="background:linear-gradient(90deg,#7c3aed,#00d4ff);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.75em;margin-right:8px;">TOP ${i + 1}</span>
                  ${p.ringLocation ? `[${p.ringLocation}] ` : ''}${p.district} - ${p.name}
                </div>
                <div class="property-name"><a href="${p.url}" target="_blank">查看详情 →</a></div>
                <div class="property-price">${priceStr}</div>
                <div class="property-layout">${p.layout}</div>
                <div style="color:#666;font-size:0.85rem;margin-top:8px;">📍 ${p.address || ''}</div>
              </div>
            `;
          }).join('');
        } else {
          newPropsGrid.innerHTML = '<div class="loading">暂无新房数据</div>';
        }

        // Update resale properties
        const resalePropsGrid = document.getElementById('resalePropertiesGrid');
        if (data.resaleProperties && data.resaleProperties.length > 0) {
          resalePropsGrid.innerHTML = data.resaleProperties.map((p, i) => {
            return `
              <div class="property-card">
                <div class="property-location">
                  <span style="background:linear-gradient(90deg,#f59e0b,#ef4444);color:#fff;padding:2px 8px;border-radius:4px;font-size:0.75em;margin-right:8px;">性价比 ${i + 1}</span>
                  ${p.areaName} · ${p.district}
                </div>
                <div class="property-name"><a href="${p.url}" target="_blank">${p.community}</a></div>
                <div class="property-price">${p.totalPrice}万 <span>(${formatNumber(p.unitPrice)}元/㎡)</span></div>
                <div class="property-layout">${p.layout} · ${p.area}㎡</div>
                <div style="color:#666;font-size:0.85rem;margin-top:8px;">📍 ${p.address}</div>
              </div>
            `;
          }).join('');
        } else {
          resalePropsGrid.innerHTML = '<div class="loading">暂无符合条件的二手房</div>';
        }

        // Load history for chart
        await loadChart();

      } catch (error) {
        console.error('Failed to load data:', error);
        document.getElementById('districtsGrid').innerHTML = 
          '<div class="loading">数据加载失败</div>';
      }
    }

    async function loadChart() {
      try {
        const historyResponse = await fetch('data/history/index.json');
        const historyFiles = await historyResponse.json();
        
        const dataPoints = [];
        
        for (const file of historyFiles.slice(-30)) {
          try {
            const dayResponse = await fetch(`data/history/${file}`);
            const dayData = await dayResponse.json();
            dataPoints.push({
              date: file.replace('.json', ''),
              resale: dayData.metrics.resale.avgPrice,
              new: dayData.metrics.new.avgPrice
            });
          } catch (e) {}
        }

        if (dataPoints.length > 1) {
          renderChart(dataPoints);
        } else {
          document.querySelector('.chart-container').innerHTML = 
            '<p style="text-align:center;color:#666;">需要更多历史数据才能显示趋势图</p>';
        }
      } catch (error) {
        document.querySelector('.chart-container').innerHTML = 
          '<p style="text-align:center;color:#666;">暂无历史数据</p>';
      }
    }

    function renderChart(dataPoints) {
      const ctx = document.getElementById('trendChart').getContext('2d');
      
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: dataPoints.map(d => d.date.slice(5)),
          datasets: [
            {
              label: '二手均价',
              data: dataPoints.map(d => d.resale),
              borderColor: '#00d4ff',
              backgroundColor: 'rgba(0, 212, 255, 0.1)',
              tension: 0.3,
              fill: true
            },
            {
              label: '新房均价',
              data: dataPoints.map(d => d.new),
              borderColor: '#7c3aed',
              backgroundColor: 'rgba(124, 58, 237, 0.1)',
              tension: 0.3,
              fill: true
            }
          ]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: '#888' } }
          },
          scales: {
            x: {
              ticks: { color: '#666' },
              grid: { color: 'rgba(255,255,255,0.05)' }
            },
            y: {
              ticks: { 
                color: '#666',
                callback: value => value.toLocaleString()
              },
              grid: { color: 'rgba(255,255,255,0.05)' }
            }
          }
        }
      });
    }

    loadData();
  </script>
</body>
</html>
